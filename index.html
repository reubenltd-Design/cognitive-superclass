<!DOCTYPE html>
<html>
<head>
  <title>Polymath Cognitive System V2</title>

  <style>
    body {
      margin:0;
      font-family:-apple-system,Segoe UI;
      background:radial-gradient(circle at top,#0f172a,#020617);
      color:white;
      text-align:center;
    }

    #core{
      width:110px;height:110px;margin:20px auto;
      border-radius:50%;
      background:radial-gradient(circle,#3b82f6,#1d4ed8);
      box-shadow:0 0 40px rgba(59,130,246,0.6);
      animation:pulse 3s infinite;
    }

    @keyframes pulse{50%{transform:scale(1.15)}}

    #center{
      width:300px;
      margin:10px auto;
      padding:20px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
    }

    .card{
      margin:20px auto;
      width:340px;
      padding:20px;
      border-radius:12px;
      background:rgba(255,255,255,0.05);
    }

    button{
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    input{
      padding:10px;
      margin:10px;
      text-align:center;
    }

    #nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:black;
      padding:10px;
    }
  </style>
</head>

<body>

<h2>🧠 Polymath System V2</h2>

<div id="core"></div>

<div id="center"></div>

<p id="stats"></p>

<div id="main"></div>

<div id="nav">
  <button onclick="showDashboard()">📊</button>
</div>

<script>

// ---------------- RANK SYSTEM ----------------
const ranks = [
"Beginner","Apprentice","Practitioner",
"Advanced Calculator","Expert","Elite","Master","Grandmaster"
];

// ---------------- DATA ----------------
let state = JSON.parse(localStorage.getItem("state")) || {
  math:1,
  memory:1,
  focus:1,
  score:0,
  streak:0
};

function save(){
  localStorage.setItem("state",JSON.stringify(state));
  updateUI();
}

function getRank(){
  let avg=(state.math+state.memory+state.focus)/3;
  return ranks[Math.min(ranks.length-1,Math.floor(avg))];
}

function updateUI(){
  document.getElementById("stats").innerText =
  `${getRank()} | Score ${state.score}`;
}
updateUI();

function center(t){document.getElementById("center").innerHTML=t;}
function show(t){document.getElementById("main").innerHTML=`<div class="card">${t}</div>`;}

// ---------------- CONTROL PANEL ----------------
function showControl(){
center(`
<h3>Start Training</h3>

<button onclick="startAI()">🧠 AI Mode</button>
<br><br>

<h4>Manual Mode</h4>
${ranks.map(r=>`<button onclick="startManual('${r}')">${r}</button>`).join("")}
`);
}

showControl();

// ---------------- SESSION ----------------
let session=[];
let current=0;

function startAI(){
center("AI Generating Training...");
session=generateAIPlan();
current=0;
setTimeout(nextTask,500);
}

function startManual(rank){
center("Manual Mode: "+rank);
session=generateManualPlan(rank);
current=0;
setTimeout(nextTask,500);
}

// ---------------- AI ENGINE ----------------
function generateAIPlan(){
let plan=[];

if(state.math < state.memory) plan.push("math");
if(state.memory < state.focus) plan.push("memory");

plan.push("focus","math","memory");

return plan;
}

function generateManualPlan(rank){
let difficulty = ranks.indexOf(rank)+1;

let plan=[];
for(let i=0;i<difficulty;i++){
plan.push("math","memory");
}

return plan;
}

// ---------------- TASK FLOW ----------------
function nextTask(){
if(current>=session.length){
center("Session Complete 🔥");
state.streak++;
save();
showControl();
return;
}

let t=session[current];

if(t==="math") speedMath();
if(t==="memory") memory();
if(t==="focus") focus();
}

// ---------------- MATH ----------------
function speedMath(){
center("Math Training");

let base=Math.floor(state.math*10);
let n=Math.floor(Math.random()*base)+10;
let correct=n*11;

show(`<h3>${n} × 11</h3>
<input id="a">
<button onclick="checkMath(${correct})">Submit</button>`);
}

function checkMath(correct){
let v=parseInt(document.getElementById("a").value);

if(v===correct){
state.math+=0.1;
state.score++;
center("Correct");
}else{
state.math-=0.05;
center("Error");
}

current++;
save();
nextTask();
}

// ---------------- MEMORY ----------------
function memory(){
center("Memory Training");

let count=Math.floor(state.memory)+3;
let pool=["dog","pizza","rocket","guitar","dragon","car"];
let items=pool.sort(()=>0.5-Math.random()).slice(0,count);

show(`<p>${items.join(", ")}</p>
<button onclick='recall(${JSON.stringify(items)})'>Start</button>`);
}

function recall(items){
let inputs=items.map((_,i)=>`<input id="i${i}"><br>`).join("");
show(inputs+`<button onclick='checkMemory(${JSON.stringify(items)})'>Check</button>`);
}

function checkMemory(items){
let c=0;

items.forEach((it,i)=>{
if(document.getElementById("i"+i).value===it)c++;
});

if(c>items.length/2){
state.memory+=0.1;
center("Memory Success");
}else{
state.memory-=0.05;
center("Memory Weak");
}

state.score+=c;

current++;
save();
nextTask();
}

// ---------------- FOCUS ----------------
function focus(){
center("Focus Training");

show(`<h3>Focus 10 seconds</h3>
<button onclick="finishFocus()">Done</button>`);
}

function finishFocus(){
state.focus+=0.1;
center("Focus Complete");

current++;
save();
nextTask();
}

// ---------------- DASHBOARD ----------------
function showDashboard(){
center("Performance");

show(`
<p>Math: ${state.math.toFixed(2)}</p>
<p>Memory: ${state.memory.toFixed(2)}</p>
<p>Focus: ${state.focus.toFixed(2)}</p>
<p>Streak: ${state.streak}</p>
`);
}

</script>

</body>
</html>
