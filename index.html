<!DOCTYPE html>
<html>
<head>
<title>Polymath System Elite</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,Segoe UI;
background:linear-gradient(160deg,#020617,#0f172a);
color:#e2e8f0;
text-align:center;
}

/* TITLE */
h2{
margin-top:15px;
opacity:0.9;
}

/* RANK DISPLAY */
#rank-display{
margin-top:10px;
}

.rank-title{
font-size:14px;
opacity:0.6;
letter-spacing:2px;
}

.rank-name{
font-size:30px;
font-weight:bold;
margin:5px 0;
color:#60a5fa;
}

.rank-next{
font-size:13px;
opacity:0.6;
}

.progress{
width:260px;
height:10px;
background:#1e293b;
border-radius:10px;
margin:8px auto;
}

.bar{
height:10px;
background:linear-gradient(90deg,#3b82f6,#60a5fa);
border-radius:10px;
}

/* CORE */
#core{
width:120px;height:120px;margin:20px auto;
border-radius:50%;
background:radial-gradient(circle,#3b82f6,#1d4ed8);
box-shadow:0 0 60px rgba(59,130,246,0.7);
animation:pulse 3s infinite;
}
@keyframes pulse{
50%{transform:scale(1.2);}
}

/* CENTER PANEL */
#center{
width:340px;
margin:10px auto;
padding:25px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* CARDS */
.card{
margin:20px auto;
width:360px;
padding:25px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* BUTTONS */
button{
padding:10px 14px;
margin:6px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px rgba(59,130,246,0.7);
}

/* NAV */
#nav{
position:fixed;
bottom:0;
width:100%;
background:rgba(2,6,23,0.9);
padding:12px;
}

/* STATS */
#stats{
font-size:13px;
opacity:0.7;
margin-top:5px;
}
</style>
</head>

<body>

<h2>🧠 Polymath System</h2>

<div id="rank-display"></div>

<div id="core"></div>

<div id="center"></div>

<p id="stats"></p>

<div id="main"></div>

<div id="nav">
<button onclick="dashboard()">📊</button>
</div>

<script>

// ---------------- RANKS ----------------
const ranks=["Beginner","Apprentice","Practitioner","Advanced Calculator","Expert","Elite","Master","Grandmaster"];

// ---------------- DATA ----------------
let state=JSON.parse(localStorage.getItem("state"))||{
math:1,memory:1,focus:1,score:0,streak:0,history:[],lastDate:null
};

function save(){
localStorage.setItem("state",JSON.stringify(state));
updateUI();
}

function avg(){
return (state.math+state.memory+state.focus)/3;
}

function getRank(){
return ranks[Math.min(ranks.length-1,Math.floor(avg()))];
}

function progressPercent(){
return (avg()%1)*100;
}

// ---------------- UI ----------------
function updateUI(){
let currentRank=getRank();
let nextRank=ranks[Math.min(ranks.length-1,Math.floor(avg())+1)];

document.getElementById("rank-display").innerHTML=`
<div class="rank-title">RANK</div>
<div class="rank-name">${currentRank}</div>
<div class="progress"><div class="bar" style="width:${progressPercent()}%"></div></div>
<div class="rank-next">Next: ${nextRank}</div>
`;

document.getElementById("stats").innerText=
`Score: ${state.score} | Streak: ${state.streak}`;
}
updateUI();

function center(t){document.getElementById("center").innerHTML=t;}
function show(t){document.getElementById("main").innerHTML=`<div class="card">${t}</div>`;}

// ---------------- CONTROL ----------------
function control(){
center(`
<h3>Start Training</h3>
<button onclick="startAI()">🧠 AI Mode</button>
<br><br>
<h4>Manual Mode</h4>
${ranks.map(r=>`<button onclick="startManual('${r}')">${r}</button>`).join("")}
`);
}
control();

// ---------------- SESSION ----------------
let session=[],current=0;

function startAI(){
center("AI Building Plan...");
session=generateAI();
current=0;
setTimeout(next,500);
}

function startManual(rank){
center("Manual: "+rank);
session=generateManual(rank);
current=0;
setTimeout(next,500);
}

// ---------------- AI ENGINE ----------------
function generateAI(){
let total=state.math+state.memory+state.focus;

let weights={
math:1-(state.math/total),
memory:1-(state.memory/total),
focus:1-(state.focus/total)
};

let plan=[];

for(let i=0;i<5;i++){
let r=Math.random();
if(r<weights.math) plan.push("math");
else if(r<weights.math+weights.memory) plan.push("memory");
else plan.push("focus");
}

return plan;
}

function generateManual(rank){
let lvl=ranks.indexOf(rank)+1;
let p=[];
for(let i=0;i<lvl;i++){p.push("math","memory");}
return p;
}

// ---------------- FLOW ----------------
function next(){
if(current>=session.length){
completeSession();
return;
}

let t=session[current];

if(t==="math") math();
if(t==="memory") memory();
if(t==="focus") focus();
}

function completeSession(){
center("Session Complete 🔥");

let today=new Date().toDateString();
if(state.lastDate!==today){
state.streak++;
state.lastDate=today;
}

state.history.push(avg());
if(state.history.length>20) state.history.shift();

save();
control();
}

// ---------------- TASKS ----------------
function math(){
center("Math");

let n=Math.floor(Math.random()*50)+10;
let c=n*11;

show(`<h3>${n}×11</h3>
<input id="a">
<button onclick="checkMath(${c})">Submit</button>`);
}

function checkMath(c){
let v=parseInt(document.getElementById("a").value);

if(v===c){state.math+=0.1;state.score++;center("Correct");}
else{state.math-=0.05;center("Error");}

current++;save();next();
}

function memory(){
center("Memory");

let items=["dog","pizza","rocket","guitar"];
show(`<p>${items.join(", ")}</p>
<button onclick='recall(${JSON.stringify(items)})'>Start</button>`);
}

function recall(items){
let i=items.map((_,x)=>`<input id="i${x}"><br>`).join("");
show(i+`<button onclick='checkMemory(${JSON.stringify(items)})'>Check</button>`);
}

function checkMemory(items){
let c=0;
items.forEach((it,i)=>{if(document.getElementById("i"+i).value===it)c++;});

if(c>2){state.memory+=0.1;center("Memory Strong");}
else{state.memory-=0.05;center("Memory Weak");}

state.score+=c;

current++;save();next();
}

function focus(){
center("Focus");

show(`<h3>Focus 10s</h3>
<button onclick="finishFocus()">Done</button>`);
}

function finishFocus(){
state.focus+=0.1;
center("Focus Done");

current++;save();next();
}

// ---------------- DASHBOARD ----------------
function dashboard(){
center("Progress");

show(`<canvas id="chart"></canvas>`);

setTimeout(()=>{
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:state.history.map((_,i)=>i+1),
datasets:[{
label:"Polymath Growth",
data:state.history,
borderColor:"#3b82f6"
}]
}
});
},100);
}

</script>

</body>
</html>
