<!DOCTYPE html>
<html>
<head>
  <title>Cognitive Superclass AI</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, Segoe UI, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e2e8f0;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    #core {
      width: 110px;
      height: 110px;
      margin: 20px auto;
      border-radius: 50%;
      background: radial-gradient(circle, #3b82f6, #1d4ed8);
      box-shadow: 0 0 40px rgba(59,130,246,0.6);
      animation: pulse 3s infinite;
    }

    @keyframes pulse {
      50% { transform: scale(1.15); }
    }

    #center-display {
      width: 280px;
      margin: 10px auto;
      padding: 15px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      font-size: 16px;
      letter-spacing: 1px;
      color: #93c5fd;
      box-shadow: 0 0 25px rgba(59,130,246,0.3);
      transition: 0.3s;
    }

    .thinking {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    .core-active {
      box-shadow: 0 0 60px rgba(59,130,246,1);
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      padding: 25px;
      margin: 20px auto;
      width: 350px;
      border-radius: 16px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg,#3b82f6,#2563eb);
      color: white;
      cursor: pointer;
    }

    input {
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      text-align: center;
    }

    #nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(2,6,23,0.9);
      padding: 10px;
    }

    #nav button { width: 12%; }
  </style>
</head>

<body>

<h1>🧠 Cognitive Superclass</h1>

<div id="core"></div>

<div id="center-display">System Ready</div>

<p id="stats"></p>

<div id="container"></div>

<div id="nav">
  <button onclick="tutorial()">📘</button>
  <button onclick="coach()">🧠</button>
  <button onclick="memory()">🏠</button>
  <button onclick="speedMath()">⚡</button>
  <button onclick="dashboard()">📊</button>
  <button onclick="trainingAdvice()">🎯</button>
</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("progress")) || {score:0,xp:0,skill:1};
let weaknesses = JSON.parse(localStorage.getItem("weaknesses")) || {math:0,memory:0};
let performance = JSON.parse(localStorage.getItem("performance")) || [];

function save(){
localStorage.setItem("progress",JSON.stringify(data));
localStorage.setItem("weaknesses",JSON.stringify(weaknesses));
localStorage.setItem("performance",JSON.stringify(performance));
updateUI();
}

function updateUI(){
document.getElementById("stats").innerText=`Level ${Math.floor(data.skill)} • Score ${data.score}`;
}
updateUI();

function show(c){
document.getElementById("container").innerHTML=`<div class="card">${c}</div>`;
}

// CENTER DISPLAY (AI BRAIN)
function updateCenter(text, mode="normal"){
let el=document.getElementById("center-display");
let core=document.getElementById("core");

el.innerText=text;

el.classList.remove("thinking");
core.classList.remove("core-active");

if(mode==="thinking"){el.classList.add("thinking");}
if(mode==="active"){core.classList.add("core-active");}
}

// RECORD
function record(correct){
performance.push(correct?1:0);
if(performance.length>20)performance.shift();
save();
}

// MODULES
function tutorial(){
updateCenter("Training Protocol Active","active");
show(`<h2>Protocol</h2><p>Pause → Identify → Choose → Visualize → Execute</p>`);
}

// COACH
let coachProblem={};

function coach(){
updateCenter("AI Analyzing...","thinking");

setTimeout(()=>{
updateCenter("Coaching Mode","active");

let n=Math.floor(Math.random()*90)+10;
coachProblem={num:n,correct:n*11};

show(`<h2>${n}×11</h2>
<input id="c">
<button onclick="checkCoach()">Submit</button>`);

},600);
}

function checkCoach(){
let v=parseInt(document.getElementById("c").value);

if(v===coachProblem.correct){
record(true);
updateCenter("Correct Execution","active");
show(`<h2>Correct</h2>`);
}else{
record(false);
weaknesses.math++; save();
updateCenter("Error Detected","thinking");
show(`<h2>${coachProblem.correct}</h2>`);
}
}

// MEMORY
function memory(){
updateCenter("Generating Memory Set...","thinking");

setTimeout(()=>{
updateCenter("Memory Training","active");

let pool=["dog","pizza","rocket","guitar","dragon"];
let items=pool.sort(()=>0.5-Math.random()).slice(0,4);

show(`<p>${items.join(", ")}</p>
<button onclick='recall(${JSON.stringify(items)})'>Start</button>`);

},600);
}

function recall(items){
updateCenter("Recall Phase","active");

let i=items.map((_,x)=>`<input id="i${x}"><br>`).join("");

show(i+`<button onclick='checkMemory(${JSON.stringify(items)})'>Check</button>`);
}

function checkMemory(items){
let c=0;

items.forEach((it,i)=>{
if(document.getElementById("i"+i).value===it)c++;
});

record(c>items.length/2);

if(c<items.length/2){
weaknesses.memory++;
save();
updateCenter("Memory Error","thinking");
}else{
updateCenter("Memory Success","active");
}

data.score+=c;

show(`<h2>${c}/${items.length}</h2>`);
}

// SPEED MATH
function speedMath(){
updateCenter("AI Generating Problem...","thinking");

setTimeout(()=>{
updateCenter("Speed Calculation","active");

let n=Math.floor(Math.random()*90)+10;
let correct=n*11;

show(`<h2>${n}×11</h2>
<input id="a">
<button onclick="checkMath(${correct})">Submit</button>`);

},600);
}

function checkMath(correct){
let v=parseInt(document.getElementById("a").value);

if(v===correct){
data.score++;
record(true);
updateCenter("Calculation Correct","active");
}else{
record(false);
weaknesses.math++;
save();
updateCenter("Calculation Error","thinking");
}

show(`<h2>${v===correct?"Correct":"Answer "+correct}</h2>`);
}

// DASHBOARD
function dashboard(){
updateCenter("Performance Analytics","active");

show(`<h2>Dashboard</h2>
<canvas id="chart"></canvas>
<p>Math Errors: ${weaknesses.math}</p>
<p>Memory Errors: ${weaknesses.memory}</p>`);

setTimeout(()=>{
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:performance.map((_,i)=>i+1),
datasets:[{
label:"Accuracy",
data:performance,
borderColor:"#3b82f6"
}]
}
});
},100);
}

// TRAINING ADVICE
function trainingAdvice(){
updateCenter("AI Recommendation","active");

let advice="Balanced Training";

if(weaknesses.math>weaknesses.memory){
advice="Focus on Speed Math";
}else if(weaknesses.memory>weaknesses.math){
advice="Focus on Memory";
}

show(`<h2>Advice</h2><p>${advice}</p>`);
}

</script>

</body>
</html>
