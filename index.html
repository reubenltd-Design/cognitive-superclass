<!DOCTYPE html>
<html>
<head>
  <title>Polymath Cognitive System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, Segoe UI;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    #core {
      width: 110px;
      height: 110px;
      margin: 20px auto;
      border-radius: 50%;
      background: radial-gradient(circle,#3b82f6,#1d4ed8);
      box-shadow: 0 0 40px rgba(59,130,246,0.6);
      animation: pulse 3s infinite;
    }

    @keyframes pulse {50%{transform:scale(1.15)}}

    #center {
      margin: 10px auto;
      width: 280px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    .card {
      margin: 20px auto;
      width: 340px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 10px;
      margin: 10px;
      text-align: center;
    }

    #nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: black;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>🧠 Polymath System</h2>

<div id="core"></div>
<div id="center">System Ready</div>
<p id="stats"></p>

<div id="main"></div>

<div id="nav">
  <button onclick="startSession()">🚀</button>
  <button onclick="dashboard()">📊</button>
</div>

<script>

// ---------------- DATA ----------------
let state = JSON.parse(localStorage.getItem("state")) || {
  math:1,
  memory:1,
  focus:1,
  score:0,
  streak:0
};

function save(){
  localStorage.setItem("state",JSON.stringify(state));
  updateUI();
}

function updateUI(){
  let polymath = ((state.math+state.memory+state.focus)/3).toFixed(1);
  document.getElementById("stats").innerText =
  `Polymath: ${polymath} | Score: ${state.score}`;
}

updateUI();

function center(t){document.getElementById("center").innerText=t;}
function show(t){document.getElementById("main").innerHTML=`<div class="card">${t}</div>`;}

// ---------------- SESSION ENGINE ----------------
let session = [];
let current = 0;

function startSession(){
  center("Generating Training...");
  
  session = generatePlan();
  current = 0;

  setTimeout(()=>{
    nextTask();
  },500);
}

function generatePlan(){
  let plan = [];

  if(state.math < state.memory) plan.push("math");
  if(state.memory < state.math) plan.push("memory");

  plan.push("focus");
  plan.push("math");
  plan.push("memory");

  return plan;
}

function nextTask(){
  if(current >= session.length){
    center("Session Complete");
    state.streak++;
    save();
    return;
  }

  let task = session[current];

  if(task==="math") speedMath();
  if(task==="memory") memory();
  if(task==="focus") focus();
}

// ---------------- MATH ----------------
function speedMath(){
  center("Math Training");

  let n=Math.floor(Math.random()*50)+10;
  let correct=n*11;

  show(`<h3>${n} × 11</h3>
  <input id="a">
  <button onclick="checkMath(${correct})">Submit</button>`);
}

function checkMath(correct){
  let v=parseInt(document.getElementById("a").value);

  if(v===correct){
    state.math+=0.1;
    state.score++;
    center("Correct");
  } else {
    state.math-=0.05;
    center("Error");
  }

  current++;
  save();
  nextTask();
}

// ---------------- MEMORY ----------------
function memory(){
  center("Memory Training");

  let items=["dog","pizza","rocket","guitar"];
  show(`<p>${items.join(", ")}</p>
  <button onclick='recall(${JSON.stringify(items)})'>Start</button>`);
}

function recall(items){
  let i=items.map((_,x)=>`<input id="i${x}"><br>`).join("");
  show(i+`<button onclick='checkMemory(${JSON.stringify(items)})'>Check</button>`);
}

function checkMemory(items){
  let c=0;
  items.forEach((it,i)=>{
    if(document.getElementById("i"+i).value===it)c++;
  });

  if(c>2){
    state.memory+=0.1;
    center("Memory Success");
  } else {
    state.memory-=0.05;
    center("Memory Weak");
  }

  state.score+=c;
  current++;
  save();
  nextTask();
}

// ---------------- FOCUS ----------------
function focus(){
  center("Focus Training");

  show(`<h3>Focus for 10 seconds</h3>
  <button onclick="finishFocus()">Done</button>`);
}

function finishFocus(){
  state.focus+=0.1;
  center("Focus Complete");
  current++;
  save();
  nextTask();
}

// ---------------- DASHBOARD ----------------
function dashboard(){
  center("Performance");

  show(`
    <h3>Stats</h3>
    <p>Math: ${state.math.toFixed(2)}</p>
    <p>Memory: ${state.memory.toFixed(2)}</p>
    <p>Focus: ${state.focus.toFixed(2)}</p>
    <p>Streak: ${state.streak}</p>
  `);
}

</script>

</body>
</html>
