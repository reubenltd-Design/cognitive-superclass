<!DOCTYPE html>
<html>
<head>
<title>Polymath System V8</title>

<style>
body{
margin:0;
font-family:-apple-system,Segoe UI;
background:linear-gradient(160deg,#0f172a,#1e293b,#0ea5e9);
color:#e2e8f0;
text-align:center;
}
.card{
width:360px;margin:10px auto;padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
}
button{
padding:10px;margin:6px;
border:none;border-radius:10px;
background:#38bdf8;color:white;
cursor:pointer;
}
textarea{width:90%;height:100px;}
</style>
</head>

<body>

<h2>🧠 Polymath V8</h2>

<div id="control"></div>
<div id="center"></div>
<div id="main"></div>
<p id="stats"></p>

<script>

// -------- CONFIG --------
const API_KEY = "YOUR_API_KEY";

// -------- STATE --------
let state = JSON.parse(localStorage.getItem("state")) || {
ai:1,
score:0,
aiLevel:1,
revenueAttempts:0,
dailyCompleted:false,
history:[]
};

function save(){
localStorage.setItem("state",JSON.stringify(state));
updateUI();
}

function updateUI(){
document.getElementById("stats").innerText =
`Level: ${state.aiLevel} | Score: ${state.score} | Revenue: ${state.revenueAttempts}`;
}
updateUI();

// -------- CONTROL --------
function control(mode="idle"){

if(mode==="idle"){
document.getElementById("control").innerHTML = `
<button onclick="start()">🚀 Start</button>
<button onclick="moneyMode()">💰 Money Mode</button>
<button onclick="dailyMission()">🎯 Daily Mission</button>
<button onclick="dashboard()">📊 Dashboard</button>
`;
}

if(mode==="active"){
document.getElementById("control").innerHTML = `
<button onclick="start()">🔁 Restart</button>
<button onclick="control()">⬅ Menu</button>
`;
}
}
control();

// -------- SESSION --------
function start(){
control("active");
aiTask();
}

// -------- AI TASK --------
function aiTask(){

let difficulty = state.aiLevel;

let tasks = [
{
type:"improve",
prompt:"Improve this prompt:",
content:"Give me business ideas"
},
{
type:"create",
prompt:"Write a prompt for:",
content:"A service that makes money using AI"
},
{
type:"strategy",
prompt:"Create a step-by-step plan:",
content:"Make $100 using AI this week"
}
];

// harder tasks at higher levels
if(difficulty > 3){
tasks.push({
type:"advanced",
prompt:"Design a micro-business:",
content:"Use AI + zero budget"
});
}

let t = tasks[Math.floor(Math.random()*tasks.length)];

window.currentTask = t;

center("AI Operator");
show(`
<h3>${t.prompt}</h3>
<p>${t.content}</p>
<textarea id="aiInput"></textarea><br>
<button onclick="submitAI()">Submit</button>
`);
}

// -------- MONEY MODE --------
function moneyMode(){
control("active");

window.currentTask = {
type:"money",
prompt:"REAL MONEY TASK",
content:"What can you sell TODAY using AI? Be specific, include price + target customer."
};

center("💰 Money Mode");
show(`
<h3>${currentTask.content}</h3>
<textarea id="aiInput"></textarea><br>
<button onclick="submitAI()">Submit</button>
`);
}

// -------- DAILY MISSION --------
function dailyMission(){

if(state.dailyCompleted){
center("Mission already completed today ✅");
return;
}

control("active");

window.currentTask = {
type:"daily",
prompt:"Daily Mission",
content:"Create one actionable AI service idea AND how you would get your first customer."
};

center("🎯 Daily Mission");
show(`
<h3>${currentTask.content}</h3>
<textarea id="aiInput"></textarea><br>
<button onclick="submitAI(true)">Complete Mission</button>
`);
}

// -------- AI EVAL --------
async function submitAI(isDaily=false){

let input = document.getElementById("aiInput").value;

center("Evaluating...");

if(currentTask.type==="money") state.revenueAttempts++;

let res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:"Score 1-10 based on clarity, specificity, usefulness, and real-world actionability. Be strict."
},
{
role:"user",
content:`TASK: ${currentTask.content}\n\nANSWER:\n${input}\n\nFormat:\nScore: X/10\nFeedback: ...`
}
]
})
});

let data = await res.json();
let text = data.choices[0].message.content;

let match = text.match(/Score:\s*(\d+)/);
let score = match ? parseInt(match[1]) : 5;

// apply results
if(score >= 7){
state.ai += 0.1;
state.score += score;

if(score >= 9) state.score += 2;

center("Strong 🔥");
}else{
state.ai -= 0.05;
center("Weak");
}

// level up
if(state.score >= state.aiLevel * 25){
state.aiLevel++;
center("LEVEL UP 🚀");
}

// daily completion
if(isDaily){
state.dailyCompleted = true;
}

// history tracking
state.history.push(score);
if(state.history.length > 30) state.history.shift();

save();

// show feedback
show(`
<h3>Feedback</h3>
<p>${text}</p>
<button onclick="start()">Next</button>
<button onclick="control()">Menu</button>
`);
}

// -------- DASHBOARD --------
function dashboard(){

center("📊 Dashboard");

let avg = state.history.length
? (state.history.reduce((a,b)=>a+b,0)/state.history.length).toFixed(2)
: 0;

show(`
<p>AI Level: ${state.aiLevel}</p>
<p>Score: ${state.score}</p>
<p>Revenue Attempts: ${state.revenueAttempts}</p>
<p>Avg Score: ${avg}</p>
<button onclick="control()">Back</button>
`);
}

</script>

</body>
</html><button onclick="start()">Start Session</button>

<script>

// -------- STATE --------
let state = JSON.parse(localStorage.getItem("state")) || {
math:1, memory:1, focus:1, ai:1,
score:0, streak:0,
aiLevel:1,
revenueAttempts:0,
history:[], lastDate:null
};

function save(){
localStorage.setItem("state",JSON.stringify(state));
updateUI();
}

// -------- UI --------
function updateUI(){
document.getElementById("rank").innerText =
"AI Level: "+state.aiLevel+" | Score: "+state.score;

document.getElementById("stats").innerText =
"Revenue Attempts: "+state.revenueAttempts;
}
updateUI();

function center(t){document.getElementById("center").innerHTML=t;}
function show(t){document.getElementById("main").innerHTML=`<div class="card">${t}</div>`;}

// -------- SESSION --------
let session=[], current=0;

function start(){
session = generate();
current = 0;
next();
}

function generate(){
let modules = ["math","memory","focus","ai"];
let arr=[];

for(let i=0;i<5;i++){
arr.push(modules[Math.floor(Math.random()*modules.length)]);
}
return arr;
}

function next(){
if(current>=session.length){complete();return;}
let t=session[current];

if(t==="math") math();
if(t==="memory") memory();
if(t==="focus") focus();
if(t==="ai") aiTask();
}

// -------- AI MODULE --------
function aiTask(){

center("AI Operator");

let level = state.aiLevel;

let tasks = [
{
type:"improve",
prompt:"Improve this prompt:",
content:"Give me business ideas"
},
{
type:"create",
prompt:"Write a prompt for:",
content:"A money-making idea using AI"
},
{
type:"real",
prompt:"REAL TASK: Generate a service you could sell TODAY",
content:"(Example: AI resume service)"
}
];

let t = tasks[Math.floor(Math.random()*tasks.length)];

show(`
<h3>${t.prompt}</h3>
<p>${t.content}</p>
<textarea id="aiInput"></textarea>
<br>
<button onclick='checkAI(${JSON.stringify(t)})'>Submit</button>
`);
}

// -------- AI EVALUATION --------
function checkAI(task){

let input = document.getElementById("aiInput").value;
let score = 0;

// basic intelligence signals
if(input.length > 30) score++;
if(input.includes("specific") || input.includes("step")) score++;
if(input.includes("target") || input.includes("audience")) score++;

// REAL TASK bonus (economic thinking)
if(task.type==="real"){
state.revenueAttempts++;
if(input.includes("$") || input.includes("sell")) score++;
}

if(score>=2){
state.ai += 0.1;
state.score += 3;
center("Strong AI Output 🔥");

// LEVEL UP
if(state.score % 10 === 0){
state.aiLevel++;
center("LEVEL UP 🚀");
}

}else{
state.ai -= 0.05;
center("Too Generic");
}

current++;
save();
next();
}

// -------- BASIC TASKS --------
function math(){
center("Math");

let n = Math.floor(Math.random()*20)+10;
let c = n*11;

show(`
<h3>${n} × 11</h3>
<input id="a">
<button onclick="checkMath(${c})">Submit</button>
`);
}

function checkMath(c){
let v = parseInt(document.getElementById("a").value);

if(v===c){state.math+=0.1;state.score++;}
else{state.math-=0.05;}

current++;save();next();
}

function memory(){
center("Memory");

let items=["dog","pizza","rocket"];
show(`
<p>${items.join(", ")}</p>
<button onclick='recall(${JSON.stringify(items)})'>Start</button>
`);
}

function recall(items){
let i=items.map((_,x)=>`<input id="i${x}"><br>`).join("");
show(i+`<button onclick='checkMemory(${JSON.stringify(items)})'>Check</button>`);
}

function checkMemory(items){
let c=0;
items.forEach((it,i)=>{
if(document.getElementById("i"+i).value===it)c++;
});

if(c>1){state.memory+=0.1;}
else{state.memory-=0.05;}

state.score+=c;
current++;save();next();
}

function focus(){
center("Focus");

show(`
<h3>Focus 10s</h3>
<button onclick="finishFocus()">Done</button>
`);
}

function finishFocus(){
state.focus+=0.1;
current++;save();next();
}

// -------- COMPLETE --------
function complete(){

center("Session Complete 🔥");

let today=new Date().toDateString();
if(state.lastDate!==today){
state.streak++;
state.lastDate=today;
}

state.history.push(state.ai);
if(state.history.length>20) state.history.shift();

save();
}

</script>

</body>
