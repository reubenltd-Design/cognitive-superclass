<!DOCTYPE html>
<html>
<head>
  <title>Cognitive Superclass AI</title>

  <style>
    body {
      margin: 0;
      font-family: Segoe UI, sans-serif;
      background: linear-gradient(160deg, #0b0f14, #121a24);
      color: white;
      text-align: center;
    }

    #core {
      width: 90px;
      height: 90px;
      margin: 20px auto;
      border-radius: 50%;
      background: #3aa0ff;
      animation: breathe 3s infinite;
    }

    @keyframes breathe {
      50% { transform: scale(1.1); }
    }

    .card {
      background: #1a2733;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      background: #3aa0ff;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 10px;
      margin: 10px;
      text-align: center;
    }

    #nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: black;
      padding: 10px;
    }

    #nav button {
      width: 15%;
    }
  </style>
</head>

<body>

<h1>🧠 Cognitive Superclass</h1>
<div id="core"></div>

<p id="stats"></p>

<div id="container"></div>

<div id="nav">
  <button onclick="tutorial()">📘</button>
  <button onclick="coach()">🧠</button>
  <button onclick="memory()">🏠</button>
  <button onclick="speedMath()">⚡</button>
  <button onclick="focus()">⏱</button>
</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("progress")) || {
  score: 0,
  xp: 0,
  skill: 1
};

let performance = { history: [] };

function save() {
  localStorage.setItem("progress", JSON.stringify(data));
  updateUI();
}

function updateUI() {
  document.getElementById("stats").innerText =
    `Level ${Math.floor(data.skill)} • Score ${data.score}`;
}

updateUI();

function show(content) {
  document.getElementById("container").innerHTML =
    `<div class="card">${content}</div>`;
}

// AI tracking
function record(correct, time=0) {
  performance.history.push({correct,time});
  if (performance.history.length > 10) performance.history.shift();
}

function accuracy() {
  let c = performance.history.filter(x=>x.correct).length;
  return c / performance.history.length || 0;
}

function speed() {
  let times = performance.history.map(x=>x.time).filter(t=>t>0);
  if (!times.length) return 1;
  let avg = times.reduce((a,b)=>a+b,0)/times.length;
  return Math.max(0.5, Math.min(2, 2000/avg));
}

function adapt() {
  let score = (accuracy()*0.7)+(speed()*0.3);

  if (score > 0.75) {
    data.skill += 0.3;
    data.xp += 10;
  } else if (score < 0.4) {
    data.skill -= 0.2;
  }

  if (data.skill < 1) data.skill = 1;
  if (data.skill > 10) data.skill = 10;

  save();
}

// 📘 Tutorial
function tutorial() {
  show(`
    <h2>Training Protocol</h2>
    <p>Pause → Identify → Choose → Visualize → Execute</p>
  `);
}

// 🧠 Coach
let coachProblem = {};

function coach() {
  let num = Math.floor(Math.random()*90)+10;
  coachProblem = { num: num, correct: num * 11 };

  show(`
    <h2>${num} × 11</h2>
    <input id="c">
    <button onclick="checkCoach()">Submit</button>
  `);
}

function checkCoach() {
  let val = parseInt(document.getElementById("c").value);
  let correct = coachProblem.correct;

  if (val === correct) {
    show(`<h2>Correct</h2>`);
  } else {
    let d = coachProblem.num.toString().split('').map(Number);
    show(`
      <h2>${correct}</h2>
      <p>${d[0]} (${d[0]}+${d[1]}) ${d[1]}</p>
    `);
  }
}

// MEMORY
function memory() {
  let items = ["dog","pizza","rocket","guitar"];
  show(`
    <p>${items.join(", ")}</p>
    <button onclick='recall(${JSON.stringify(items)})'>Start</button>
  `);
}

function recall(items) {
  let inputs = items.map((_,i)=>`<input id="i${i}"><br>`).join("");

  show(`
    <h2>Recall</h2>
    ${inputs}
    <button onclick='checkMemory(${JSON.stringify(items)})'>Check</button>
  `);
}

function checkMemory(items) {
  let correct = 0;

  items.forEach((item,i)=>{
    if(document.getElementById("i"+i).value===item) correct++;
  });

  show(`<h2>${correct}/${items.length}</h2>`);
}

// SPEED MATH
let startTime;

function speedMath() {
  let num = Math.floor(Math.random()*90)+10;
  let correct = num * 11;

  startTime = Date.now();

  show(`
    <h2>${num} × 11</h2>
    <input id="a">
    <button onclick="checkMath(${correct})">Submit</button>
  `);
}

function checkMath(correct) {
  let val = parseInt(document.getElementById("a").value);
  let t = Date.now() - startTime;

  if (val === correct) {
    data.score++;
    record(true,t);
  } else {
    record(false,t);
  }

  adapt();

  show(`<h2>${val===correct?"Correct":"Answer "+correct}</h2>`);
}

// FOCUS
function focus() {
  show(`<h2>Focus Mode</h2>`);
}

</script>

</body>
</html>
