<!DOCTYPE html>
<html>
<head>
<title>Polymath System V7.5</title>

<style>
body{
margin:0;
font-family:-apple-system,Segoe UI;
background:linear-gradient(160deg,#0f172a,#1e293b,#0ea5e9);
color:#e2e8f0;
text-align:center;
}

/* RANK */
.rank-name{font-size:30px;color:#38bdf8;}
.progress{width:260px;height:10px;background:#334155;margin:10px auto;border-radius:10px;}
.bar{height:10px;background:#38bdf8;border-radius:10px;}

/* CORE */
#core{
width:100px;height:100px;margin:20px auto;
border-radius:50%;
background:#38bdf8;
box-shadow:0 0 60px #38bdf8;
}

/* CARD */
.card{
width:340px;margin:10px auto;padding:20px;
background:rgba(255,255,255,0.08);
border-radius:15px;
}

/* BUTTON */
button{
padding:10px;margin:5px;
border:none;border-radius:10px;
background:#38bdf8;color:white;
}

/* INPUT */
textarea{width:90%;height:100px;}
.output{background:#020617;padding:10px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>🧠 Polymath System</h2>

<div id="rank"></div>
<div id="core"></div>
<div id="center"></div>
<div id="main"></div>
<p id="stats"></p>

<script>

// CONFIG
const API_KEY="YOUR_API_KEY";

// STATE
let state=JSON.parse(localStorage.getItem("state"))||{
math:1,memory:1,focus:1,ai:1,
score:0
};

function save(){
localStorage.setItem("state",JSON.stringify(state));
updateUI();
}

// UI
function avg(){return (state.math+state.memory+state.focus+state.ai)/4;}
function rank(){return avg().toFixed(1);}

function updateUI(){
document.getElementById("rank").innerHTML=
`<div class="rank-name">Level ${rank()}</div>
<div class="progress"><div class="bar" style="width:${(avg()%1)*100}%"></div></div>`;

document.getElementById("stats").innerText=
`Score: ${state.score}`;
}
updateUI();

function center(t){document.getElementById("center").innerHTML=t;}
function show(t){document.getElementById("main").innerHTML=`<div class="card">${t}</div>`;}

// MENU
function menu(){
center(`
<button onclick="math()">Math</button>
<button onclick="memory()">Memory</button>
<button onclick="focus()">Focus</button>
<button onclick="ai()">AI</button>
`);
}
menu();

// MATH
function math(){
let n=Math.floor(Math.random()*50)+10;
window.answer=n*11;

center("Math");
show(`
<h3>${n} × 11</h3>
<input id="a">
<button onclick="checkMath()">Submit</button>
`);
}

function checkMath(){
let v=parseInt(document.getElementById("a").value);

if(v===answer){
state.math+=0.1;
state.score++;
center("Correct");
}else{
state.math-=0.05;
center("Wrong");
}
save();menu();
}

// MEMORY
function memory(){
let items=["dog","pizza","rocket","guitar"];
window.items=items;

center("Memory");
show(`
<p>${items.join(", ")}</p>
<button onclick="recall()">Recall</button>
`);
}

function recall(){
show(`
<input id="i0"><br>
<input id="i1"><br>
<input id="i2"><br>
<input id="i3"><br>
<button onclick="checkMemory()">Check</button>
`);
}

function checkMemory(){
let c=0;
items.forEach((it,i)=>{
if(document.getElementById("i"+i).value===it)c++;
});

if(c>=3){
state.memory+=0.1;
center("Strong");
}else{
state.memory-=0.05;
center("Weak");
}

state.score+=c;
save();menu();
}

// FOCUS
function focus(){
center("Focus");
show(`
<h3>Focus 10 seconds</h3>
<button onclick="finishFocus()">Done</button>
`);
}

function finishFocus(){
state.focus+=0.1;
state.score++;
center("Done");
save();menu();
}

// AI
function ai(){
window.task="Improve: Give me business ideas";

center("AI");
show(`
<h3>${task}</h3>
<textarea id="input"></textarea>
<button onclick="submitAI()">Submit</button>
`);
}

async function submitAI(){

let input=document.getElementById("input").value;

center("Thinking...");

let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"Score 1-10, feedback, improve."},
{role:"user",content:`TASK: ${task}\n${input}`}
]
})
});

let data=await res.json();
let text=data.choices[0].message.content;

let scoreMatch=text.match(/(\d+)/);
let score=scoreMatch?parseInt(scoreMatch[1]):5;

if(score>=7){
state.ai+=0.1;
state.score+=score;
center("Strong");
}else{
state.ai-=0.05;
center("Weak");
}

save();

show(`<div class="output">${text}</div>`);
}

</script>

</body>
</html>
