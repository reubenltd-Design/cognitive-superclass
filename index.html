<!DOCTYPE html>
<html>
<head>
<title>Polymath System V6</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,Segoe UI;
background:linear-gradient(160deg,#0f172a,#1e293b,#0ea5e9);
color:#e2e8f0;
text-align:center;
}

/* RANK */
#rank-display{margin-top:10px;}
.rank-title{font-size:14px;opacity:0.7;letter-spacing:2px;}
.rank-name{font-size:32px;font-weight:bold;color:#38bdf8;}
.rank-next{font-size:13px;opacity:0.7;}

.progress{
width:260px;height:10px;
background:#334155;border-radius:10px;margin:8px auto;
}
.bar{
height:10px;
background:linear-gradient(90deg,#38bdf8,#22d3ee);
border-radius:10px;
}

/* CORE */
#core{
width:120px;height:120px;margin:20px auto;
border-radius:50%;
background:radial-gradient(circle,#38bdf8,#0ea5e9);
box-shadow:0 0 70px rgba(56,189,248,0.8);
animation:pulse 3s infinite;
}
@keyframes pulse{50%{transform:scale(1.2);}}

/* PANELS */
#center,.card{
width:340px;margin:10px auto;padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BUTTONS */
button{
padding:10px 14px;margin:6px;
border-radius:10px;border:none;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
color:white;cursor:pointer;
}
button:hover{transform:scale(1.05);}

/* NAV */
#nav{
position:fixed;bottom:0;width:100%;
background:rgba(15,23,42,0.9);padding:10px;
}

#stats{font-size:13px;opacity:0.8;}
#coach{
margin-top:10px;
font-size:14px;
color:#a5f3fc;
}
</style>
</head>

<body>

<h2>🧠 Polymath System V6</h2>

<div id="rank-display"></div>
<div id="core"></div>
<div id="center"></div>
<p id="stats"></p>
<div id="coach"></div>
<div id="main"></div>

<div id="nav">
<button onclick="dashboard()">📊</button>
</div>

<script>

// ---------------- RANKS ----------------
const ranks=["Beginner","Apprentice","Practitioner","Advanced Calculator","Expert","Elite","Master","Grandmaster"];

// ---------------- STATE ----------------
let state=JSON.parse(localStorage.getItem("state"))||{
math:1,memory:1,focus:1,
score:0,streak:0,
history:[],lastDate:null
};

function save(){
localStorage.setItem("state",JSON.stringify(state));
updateUI();
}

// ---------------- CALCULATIONS ----------------
function avg(){return (state.math+state.memory+state.focus)/3;}
function getRank(){return ranks[Math.min(ranks.length-1,Math.floor(avg()))];}
function progressPercent(){return (avg()%1)*100;}

// ---------------- UI ----------------
function updateUI(){
let current=getRank();
let next=ranks[Math.min(ranks.length-1,Math.floor(avg())+1)];

document.getElementById("rank-display").innerHTML=`
<div class="rank-title">RANK</div>
<div class="rank-name">${current}</div>
<div class="progress"><div class="bar" style="width:${progressPercent()}%"></div></div>
<div class="rank-next">Next: ${next}</div>
`;

document.getElementById("stats").innerText=
`Score: ${state.score} | Streak: ${state.streak}`;

updateCoach();
}
updateUI();

function center(t){document.getElementById("center").innerHTML=t;}
function show(t){document.getElementById("main").innerHTML=`<div class="card">${t}</div>`;}

// ---------------- AI COACH ----------------
function updateCoach(){

let weakest="math";
let min=Math.min(state.math,state.memory,state.focus);

if(state.memory===min) weakest="memory";
if(state.focus===min) weakest="focus";

let msg="";

if(weakest==="math") msg="🧠 Coach: Focus on math speed. Patterns will unlock your growth.";
if(weakest==="memory") msg="🧠 Coach: Strengthen memory. Visualization will amplify recall.";
if(weakest==="focus") msg="🧠 Coach: Improve focus. Control attention = higher performance.";

document.getElementById("coach").innerText=msg;
}

// ---------------- CONTROL ----------------
function control(){
center(`
<h3>Start Training</h3>
<button onclick="startAI()">🧠 AI Mode</button>
<br><br>
${ranks.map(r=>`<button onclick="startManual('${r}')">${r}</button>`).join("")}
`);
}
control();

// ---------------- AI ENGINE ----------------
function generateAI(){

let history=state.history.slice(-5);
let recent=history.length?history.reduce((a,b)=>a+b,0)/history.length:avg();

let mW=1/state.math;
let memW=1/state.memory;
let fW=1/state.focus;

let total=mW+memW+fW;
mW/=total; memW/=total; fW/=total;

let difficulty=Math.max(1,Math.floor(recent*2));

let plan=[];

for(let i=0;i<5+difficulty;i++){
let r=Math.random();
if(r<mW) plan.push("math");
else if(r<mW+memW) plan.push("memory");
else plan.push("focus");
}

return plan;
}

function generateManual(rank){
let lvl=ranks.indexOf(rank)+1;
let p=[];
for(let i=0;i<lvl;i++){p.push("math","memory");}
return p;
}

// ---------------- SESSION ----------------
let session=[],current=0;

function startAI(){
center("AI Optimizing Training...");
session=generateAI();
current=0;
setTimeout(next,500);
}

function startManual(r){
center("Manual: "+r);
session=generateManual(r);
current=0;
setTimeout(next,500);
}

function next(){
if(current>=session.length){complete();return;}
let t=session[current];
if(t==="math") math();
if(t==="memory") memory();
if(t==="focus") focus();
}

function complete(){
center("Session Complete 🔥");

let today=new Date().toDateString();
if(state.lastDate!==today){
state.streak++;
state.lastDate=today;
}

state.history.push(avg());
if(state.history.length>20) state.history.shift();

save();
control();
}

// ---------------- TASKS ----------------
function math(){
center("Math");

let base=Math.floor(state.math*15);
let n=Math.floor(Math.random()*base)+10;
let c=n*11;

show(`<h3>${n} × 11</h3>
<input id="a">
<button onclick="checkMath(${c})">Submit</button>`);
}

function checkMath(c){
let v=parseInt(document.getElementById("a").value);

if(v===c){state.math+=0.1;state.score++;center("Correct");}
else{state.math-=0.05;center("Error");}

current++;save();next();
}

function memory(){
center("Memory");

let items=["dog","pizza","rocket","guitar"];
show(`<p>${items.join(", ")}</p>
<button onclick='recall(${JSON.stringify(items)})'>Start</button>`);
}

function recall(items){
let i=items.map((_,x)=>`<input id="i${x}"><br>`).join("");
show(i+`<button onclick='checkMemory(${JSON.stringify(items)})'>Check</button>`);
}

function checkMemory(items){
let c=0;
items.forEach((it,i)=>{if(document.getElementById("i"+i).value===it)c++;});

if(c>2){state.memory+=0.1;center("Memory Strong");}
else{state.memory-=0.05;center("Memory Weak");}

state.score+=c;
current++;save();next();
}

function focus(){
center("Focus");

show(`<h3>Focus 10s</h3>
<button onclick="finishFocus()">Done</button>`);
}

function finishFocus(){
state.focus+=0.1;
center("Focus Complete");

current++;save();next();
}

// ---------------- DASHBOARD ----------------
function dashboard(){
center("Progress");

show(`<canvas id="chart"></canvas>`);

setTimeout(()=>{
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:state.history.map((_,i)=>i+1),
datasets:[{
label:"Growth",
data:state.history,
borderColor:"#38bdf8"
}]
}
});
},100);
}

</script>

</body>
</html>
